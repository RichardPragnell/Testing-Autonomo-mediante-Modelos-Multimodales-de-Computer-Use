<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Esquema del entorno reproducible de testing agentico</title>
  <desc id="desc">Infografia de tipo paper cientifico que muestra como se combinan las aplicaciones benchmark, el contrato funcional, los escenarios, los prompts y la configuracion de modelos para generar datos de evaluacion.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #17202a; }
      .subtitle { font: 400 19px Arial, Helvetica, sans-serif; fill: #4d5965; }
      .section-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #17202a; }
      .box-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #17202a; }
      .box-text { font: 400 15px Arial, Helvetica, sans-serif; fill: #34404c; }
      .small { font: 400 13px Arial, Helvetica, sans-serif; fill: #50606f; }
      .tag { font: 700 12px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: .3px; }
      .panel { fill: #ffffff; stroke: #c9d1d9; stroke-width: 2; rx: 8; }
      .soft-blue { fill: #eaf3fb; stroke: #8eb8db; }
      .soft-green { fill: #eaf6ef; stroke: #8dc8a3; }
      .soft-amber { fill: #fff4df; stroke: #d8b66a; }
      .soft-red { fill: #fcebea; stroke: #d99a96; }
      .soft-gray { fill: #edf0f3; stroke: #aeb8c2; }
      .core { fill: #263746; stroke: #17202a; stroke-width: 2; rx: 8; }
      .core-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .core-text { font: 400 15px Arial, Helvetica, sans-serif; fill: #dbe4ec; }
      .arrow { stroke: #5d6d7e; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-soft { stroke: #8a97a5; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead-soft); stroke-dasharray: 8 7; }
      .lane-label { font: 700 14px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .num { font: 700 16px Arial, Helvetica, sans-serif; fill: #ffffff; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 Z" fill="#5d6d7e"/>
    </marker>
    <marker id="arrowhead-soft" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 Z" fill="#8a97a5"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#17202a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" width="1600" height="1000"/>

  <text class="title" x="80" y="70">Entorno reproducible para testing agentico de aplicaciones web</text>
  <text class="subtitle" x="80" y="103">Combinacion de aplicaciones benchmark, escenarios, prompts y modelos para generar evidencias estructuradas de evaluacion</text>

  <rect x="80" y="145" width="1440" height="760" rx="8" fill="#ffffff" stroke="#d3dae2" stroke-width="2"/>

  <rect x="110" y="175" width="310" height="42" rx="8" fill="#476f95"/>
  <text class="lane-label" x="132" y="202">1. Superficie reproducible</text>

  <rect x="455" y="175" width="310" height="42" rx="8" fill="#4c8362"/>
  <text class="lane-label" x="477" y="202">2. Definicion experimental</text>

  <rect x="800" y="175" width="310" height="42" rx="8" fill="#8b6f33"/>
  <text class="lane-label" x="822" y="202">3. Configuracion IA</text>

  <rect x="1145" y="175" width="310" height="42" rx="8" fill="#6d7884"/>
  <text class="lane-label" x="1167" y="202">4. Datos para informes</text>

  <g filter="url(#shadow)">
    <rect class="panel soft-blue" x="110" y="250" width="310" height="140"/>
    <circle cx="138" cy="278" r="16" fill="#476f95"/>
    <text class="num" x="133" y="284">A</text>
    <text class="box-title" x="165" y="282">Aplicaciones benchmark</text>
    <text class="box-text" x="135" y="320">Todo React, Todo Next.js y Todo Angular</text>
    <text class="box-text" x="135" y="346">comparten comportamiento visible, datos</text>
    <text class="box-text" x="135" y="372">iniciales y flujos funcionales.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel soft-blue" x="110" y="430" width="310" height="150"/>
    <circle cx="138" cy="458" r="16" fill="#476f95"/>
    <text class="num" x="133" y="464">B</text>
    <text class="box-title" x="165" y="462">Contrato funcional comun</text>
    <text class="box-text" x="135" y="500">`specs/todo-web/contract.json` fija</text>
    <text class="box-text" x="135" y="526">textos, datos semilla, acciones,</text>
    <text class="box-text" x="135" y="552">escenarios y fallos controlados.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel soft-blue" x="110" y="620" width="310" height="140"/>
    <circle cx="138" cy="648" r="16" fill="#476f95"/>
    <text class="num" x="133" y="654">C</text>
    <text class="box-title" x="165" y="652">Plantillas limpias</text>
    <text class="box-text" x="135" y="690">Cada ejecucion usa una copia aislada</text>
    <text class="box-text" x="135" y="716">de la aplicacion para evitar contaminacion</text>
    <text class="box-text" x="135" y="742">entre pruebas y repetir condiciones.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel soft-green" x="455" y="250" width="310" height="140"/>
    <circle cx="483" cy="278" r="16" fill="#4c8362"/>
    <text class="num" x="478" y="284">D</text>
    <text class="box-title" x="510" y="282">Escenarios y capacidades</text>
    <text class="box-text" x="480" y="320">Carga, alta, completado, filtrado,</text>
    <text class="box-text" x="480" y="346">edicion y eliminacion se describen</text>
    <text class="box-text" x="480" y="372">como flujos verificables.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel soft-red" x="455" y="430" width="310" height="150"/>
    <circle cx="483" cy="458" r="16" fill="#a35651"/>
    <text class="num" x="478" y="464">E</text>
    <text class="box-title" x="510" y="462">Paquetes de fallos</text>
    <text class="box-text" x="480" y="500">Defectos equivalentes se inyectan en</text>
    <text class="box-text" x="480" y="526">cada framework para estudiar deteccion,</text>
    <text class="box-text" x="480" y="552">diagnostico y reparacion.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel soft-green" x="455" y="620" width="310" height="140"/>
    <circle cx="483" cy="648" r="16" fill="#4c8362"/>
    <text class="num" x="478" y="654">F</text>
    <text class="box-title" x="510" y="652">Manifiestos de ejecucion</text>
    <text class="box-text" x="480" y="690">`target.json` y `benchmark.json` unen</text>
    <text class="box-text" x="480" y="716">aplicacion, comandos, escenarios,</text>
    <text class="box-text" x="480" y="742">fallos y parametros de runtime.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel soft-amber" x="800" y="250" width="310" height="140"/>
    <circle cx="828" cy="278" r="16" fill="#8b6f33"/>
    <text class="num" x="823" y="284">G</text>
    <text class="box-title" x="855" y="282">Registro de modelos</text>
    <text class="box-text" x="825" y="320">`experiments/models/registry.yaml`</text>
    <text class="box-text" x="825" y="346">habilita proveedores y modelos sin</text>
    <text class="box-text" x="825" y="372">cambiar el contrato del benchmark.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel soft-amber" x="800" y="430" width="310" height="150"/>
    <circle cx="828" cy="458" r="16" fill="#8b6f33"/>
    <text class="num" x="823" y="464">H</text>
    <text class="box-title" x="855" y="462">Prompts experimentales</text>
    <text class="box-text" x="825" y="500">Prompts guiados, autonomos y de</text>
    <text class="box-text" x="825" y="526">reparacion establecen el modo de</text>
    <text class="box-text" x="825" y="552">interaccion del agente.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="core" x="800" y="620" width="310" height="140"/>
    <text class="core-title" x="835" y="662">Suite resuelta</text>
    <text class="core-text" x="835" y="694">El orquestador combina aplicacion,</text>
    <text class="core-text" x="835" y="720">escenarios, bug packs, prompts, modelo</text>
    <text class="core-text" x="835" y="746">y parametros en una ejecucion concreta.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel soft-gray" x="1145" y="250" width="310" height="140"/>
    <circle cx="1173" cy="278" r="16" fill="#6d7884"/>
    <text class="num" x="1168" y="284">I</text>
    <text class="box-title" x="1200" y="282">Ejecucion local</text>
    <text class="box-text" x="1170" y="320">Stagehand interactua con la AUT local</text>
    <text class="box-text" x="1170" y="346">en un workspace aislado y genera</text>
    <text class="box-text" x="1170" y="372">trazas de la prueba.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel soft-gray" x="1145" y="430" width="310" height="150"/>
    <circle cx="1173" cy="458" r="16" fill="#6d7884"/>
    <text class="num" x="1168" y="464">J</text>
    <text class="box-title" x="1200" y="462">Artefactos estructurados</text>
    <text class="box-text" x="1170" y="500">Se guardan ejecuciones, capturas,</text>
    <text class="box-text" x="1170" y="526">observaciones, acciones, uso del modelo</text>
    <text class="box-text" x="1170" y="552">y datos de validacion.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel soft-gray" x="1145" y="620" width="310" height="140"/>
    <circle cx="1173" cy="648" r="16" fill="#6d7884"/>
    <text class="num" x="1168" y="654">K</text>
    <text class="box-title" x="1200" y="652">Base para reportes</text>
    <text class="box-text" x="1170" y="690">Los datos quedan listos para generar</text>
    <text class="box-text" x="1170" y="716">informes JSON/HTML y comparativas</text>
    <text class="box-text" x="1170" y="742">en la siguiente fase.</text>
  </g>

  <path class="arrow" d="M420 320 C445 320, 430 320, 455 320"/>
  <path class="arrow" d="M420 505 C445 505, 430 505, 455 505"/>
  <path class="arrow" d="M420 690 C445 690, 430 690, 455 690"/>
  <path class="arrow" d="M765 320 C790 320, 775 320, 800 320"/>
  <path class="arrow" d="M765 505 C790 505, 775 505, 800 505"/>
  <path class="arrow" d="M765 690 C790 690, 775 690, 800 690"/>
  <path class="arrow" d="M1110 690 C1135 690, 1120 690, 1145 690"/>
  <path class="arrow" d="M1110 320 C1135 320, 1120 320, 1145 320"/>
  <path class="arrow" d="M1300 390 L1300 430"/>
  <path class="arrow" d="M1300 580 L1300 620"/>

  <path class="arrow-soft" d="M610 390 C610 405, 610 415, 610 430"/>
  <path class="arrow-soft" d="M955 390 C955 405, 955 415, 955 430"/>
  <path class="arrow-soft" d="M955 580 C955 595, 955 605, 955 620"/>

  <rect x="170" y="810" width="1260" height="58" rx="8" fill="#edf0f3" stroke="#c9d1d9"/>
  <text class="section-title" x="200" y="846">Idea clave:</text>
  <text class="box-text" x="310" y="846">mantener constantes aplicaciones, escenarios y configuracion permite repetir pruebas con nuevos modelos de IA y preparar datos comparables para informes posteriores.</text>

  <text class="small" x="80" y="945">TFM - Entorno de testing autonomo y resiliente mediante modelos multimodales de Computer Use</text>
  <text class="small" x="1240" y="945">Figura: fase de preparacion y captura de evidencias</text>
</svg>
